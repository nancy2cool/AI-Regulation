<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U.S. State AI Regulation Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0f172a;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    header h1 span {
      color: #38bdf8;
    }
    header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 4px;
    }
    .header-meta {
      text-align: right;
      font-size: 0.75rem;
      color: #64748b;
    }
    .header-meta strong {
      display: block;
      color: #94a3b8;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Layout ── */
    .main-layout {
      display: flex;
      height: calc(100vh - 80px);
      overflow: hidden;
    }

    /* ── Map panel ── */
    .map-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 24px 16px;
      overflow: hidden;
      transition: flex 0.35s ease;
      position: relative;
    }
    .map-panel.panel-open { flex: 0 0 55%; }

    #map {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #map svg {
      width: 100%;
      height: 100%;
      cursor: grab;
      display: block;
    }
    #map svg.dragging { cursor: grabbing; }

    .state-path {
      stroke: #fff;
      stroke-width: 0.6;
      cursor: pointer;
    }
    .state-path:hover { opacity: 0.82; filter: brightness(1.1); }
    .state-path.active { stroke: #0f172a; stroke-width: 2; }

    /* ── Zoom controls ── */
    .zoom-controls {
      position: absolute;
      top: 30px;
      left: 30px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 10;
    }
    .zoom-btn {
      width: 30px;
      height: 30px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #475569;
      box-shadow: 0 1px 5px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .zoom-btn:hover { background: #f1f5f9; color: #0f172a; }
    .zoom-btn.reset { font-size: 0.7rem; letter-spacing: 0; font-weight: 600; }

    /* ── Legend ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .legend-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-right: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: #475569;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.08);
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: #0f172a;
      color: #f8fafc;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      min-width: 160px;
    }
    #tooltip .tt-state { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    #tooltip .tt-score { color: #38bdf8; font-weight: 600; }
    #tooltip .tt-hint { color: #64748b; font-size: 0.7rem; margin-top: 4px; }

    /* ── Detail panel ── */
    .detail-panel {
      width: 0;
      overflow: hidden;
      background: #fff;
      border-left: 1px solid #e2e8f0;
      transition: width 0.35s ease;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open { width: 45%; min-width: 380px; }

    .detail-inner {
      padding: 28px 28px 40px;
      overflow-y: auto;
      height: 100%;
    }

    /* ── Detail header ── */
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .detail-state-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      line-height: 1;
    }
    .btn-close {
      background: #f1f5f9;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1rem;
      color: #64748b;
      transition: background 0.15s;
      line-height: 1;
    }
    .btn-close:hover { background: #e2e8f0; color: #1e293b; }

    /* ── Score summary ── */
    .score-summary {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .score-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 3px solid;
    }
    .score-circle .sc-num {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
    }
    .score-circle .sc-denom {
      font-size: 0.6rem;
      color: inherit;
      opacity: 0.65;
    }
    .score-info { flex: 1; }
    .score-info .rating-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 20px;
      color: #fff;
      margin-bottom: 7px;
    }
    .score-info .score-label {
      font-size: 0.82rem;
      color: #475569;
      line-height: 1.5;
    }
    .score-info .score-bar-wrap {
      background: #e2e8f0;
      border-radius: 4px;
      height: 6px;
      margin-top: 9px;
      overflow: hidden;
    }
    .score-info .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .score-info .score-bar-label {
      font-size: 0.68rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ── Category section ── */
    .category-section { margin-bottom: 28px; }
    .category-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category-subtotal {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0;
    }

    /* ── Question card ── */
    .q-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .q-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .q-num {
      background: #0f172a;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 3px 7px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .q-text {
      font-size: 0.82rem;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.45;
    }

    .q-score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }
    .q-dots { display: flex; gap: 4px; }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #e2e8f0;
    }
    .dot.filled { background: currentColor; }
    .q-score-num {
      font-size: 0.75rem;
      font-weight: 700;
      color: #475569;
    }

    .q-law {
      font-size: 0.75rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 5px;
    }
    .q-evidence {
      font-size: 0.78rem;
      color: #475569;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .q-note {
      background: #fefce8;
      border-left: 3px solid #eab308;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: #713f12;
      border-radius: 0 6px 6px 0;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .q-sources { margin-top: 6px; }
    .q-sources-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 3px;
    }
    .q-sources a {
      display: block;
      font-size: 0.72rem;
      color: #2563eb;
      text-decoration: none;
      word-break: break-all;
      line-height: 1.5;
    }
    .q-sources a:hover { text-decoration: underline; }

    /* ── "Not yet evaluated" placeholder ── */
    .not-scored-msg {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .not-scored-msg svg { margin-bottom: 12px; opacity: 0.4; }
    .not-scored-msg p { font-size: 0.9rem; }

    /* ── Color helpers ── */
    .color-very-weak   { color: #dc2626; border-color: #dc2626; }
    .color-weak        { color: #ea580c; border-color: #ea580c; }
    .color-partial     { color: #ca8a04; border-color: #ca8a04; }
    .color-strong      { color: #16a34a; border-color: #16a34a; }
    .color-comprehensive { color: #15803d; border-color: #15803d; }

    .bg-very-weak        { background: #dc2626; }
    .bg-weak             { background: #ea580c; }
    .bg-partial          { background: #ca8a04; }
    .bg-strong           { background: #16a34a; }
    .bg-comprehensive    { background: #15803d; }

    .fill-very-weak   { background: #dc2626; }
    .fill-weak        { background: #ea580c; }
    .fill-partial     { background: #ca8a04; }
    .fill-strong      { background: #16a34a; }
    .fill-comprehensive { background: #15803d; }

    /* ── Map instructions ── */
    .map-hint {
      text-align: center;
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>

    </div>
    <p class="map-hint">Scroll to zoom · Drag to pan · Click state for scorecard</p>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner" id="detailInner">

  </div>

</div>

<!-- Tooltip -->
<div id="tooltip"></div>

  "15":"Hawaii","16":"Idaho","17":"Illinois","18":"Indiana","19":"Iowa","20":"Kansas",

  "36":"New York","37":"North Carolina","38":"North Dakota","39":"Ohio","40":"Oklahoma",
  "41":"Oregon","42":"Pennsylvania","44":"Rhode Island","45":"South Carolina",
  "46":"South Dakota","47":"Tennessee","48":"Texas","49":"Utah","50":"Vermont",

};

// ════════════════════════════════════════════════════════════════
// SCORING HELPERS
// ════════════════════════════════════════════════════════════════
function normalizedScore(d) {
  return Math.round((d.rawScore / d.maxRaw) * 100);
}

function scoreCategory(raw) {
  if (raw <= 4)  return { label: "Very Weak Protection",    cls: "very-weak",      mapColor: "#dc2626" };
  if (raw <= 9)  return { label: "Weak Protection",         cls: "weak",           mapColor: "#ea580c" };
  if (raw <= 14) return { label: "Partial Protection",      cls: "partial",        mapColor: "#ca8a04" };
  if (raw <= 19) return { label: "Strong Protection",       cls: "strong",         mapColor: "#16a34a" };
  return           { label: "Comprehensive Protection",     cls: "comprehensive",  mapColor: "#15803d" };
}

function getStateColor(name) {
  const d = STATE_DATA[name];
  if (!d) return "#cbd5e1";
  return scoreCategory(d.rawScore).mapColor;
}

function dotColor(cls) {
  return { "very-weak":"#dc2626","weak":"#ea580c","partial":"#ca8a04","strong":"#16a34a","comprehensive":"#15803d" }[cls] || "#64748b";
}

// ════════════════════════════════════════════════════════════════
// BUILD DETAIL PANEL HTML
// ════════════════════════════════════════════════════════════════
function buildDetailHTML(name) {
  const d = STATE_DATA[name];
  if (!d) {
    return `<div class="not-scored-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      <p><strong>${name}</strong> has not yet been evaluated.</p>
      <p style="margin-top:6px;font-size:0.75rem;">Scores will appear here once research is complete.</p>
    </div>`;
  }

  const raw = d.rawScore;
  const cat = scoreCategory(raw);
  const color = dotColor(cat.cls);

  // Category subtotals
  const catHTML = d.categories.map(cat => {
    const catTotal = cat.questions.reduce((s, q) => s + q.score, 0);
    const catMax   = cat.questions.length * 4;
    const catCls   = scoreCategory(Math.round(catTotal * 24 / catMax)).cls;
    const catColor = dotColor(catCls);

    const qHTML = cat.questions.map(q => {
      const dots = Array.from({length: 4}, (_, i) =>
        `<span class="dot ${i < q.score ? 'filled' : ''}" style="color:${i < q.score ? dotColor(scoreCategory(q.score * 6).cls) : '#e2e8f0'}"></span>`
      ).join('');

      const srcHTML = q.sources.map(s =>
        `<a href="${s.url}" target="_blank" rel="noopener">${s.title} ↗</a>`
      ).join('');

      const noteHTML = q.note
        ? `<div class="q-note">⚠ ${q.note}</div>`
        : '';

      return `
        <div class="q-card">
          <div class="q-top">
            <span class="q-num">${q.id}</span>
            <span class="q-text">${q.text}</span>
          </div>
          <div class="q-score-row">
            <div class="q-dots">${dots}</div>
            <span class="q-score-num">${q.score}/4</span>
          </div>
          <div class="q-law">${q.law}</div>
          <p class="q-evidence">${q.evidence}</p>
          ${noteHTML}
          <div class="q-sources">
            <div class="q-sources-label">Sources</div>
            ${srcHTML}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="category-section">
        <div class="category-title">
          ${cat.title}
          <span class="category-subtotal" style="color:${catColor}">${catTotal}/${catMax}</span>
        </div>
        ${qHTML}
      </div>`;
  }).join('');

  return `
    <div class="detail-header">
      <div class="detail-state-name">${name}</div>
      <button class="btn-close" onclick="closePanel()" title="Close">✕</button>
    </div>

    <div class="score-summary">
      <div class="score-circle color-${cat.cls}">
        <span class="sc-num" style="color:${color}">${raw}</span>
        <span class="sc-denom" style="color:${color}">/24</span>
      </div>
      <div class="score-info">
        <span class="rating-badge bg-${cat.cls}">${cat.label.toUpperCase()}</span>
        <div class="score-label">
          Score: <strong>${raw} / ${d.maxRaw}</strong> &nbsp;·&nbsp; Last updated: ${d.lastUpdated}
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-fill fill-${cat.cls}" style="width:${Math.round(raw / d.maxRaw * 100)}%"></div>
        </div>
        <div class="score-bar-label">0 — Very Weak &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 24 — Comprehensive</div>
      </div>
    </div>

    ${catHTML}

    <p style="font-size:0.68rem;color:#94a3b8;margin-top:16px;line-height:1.6;">
      Methodology note: Each of the six questions is scored 0–4 based on the strength of enacted state law.
      Proposed-only bills cap at 1. Laws covering only government AI score 1–2 unless the question fits.
      Court-enjoined laws are discounted. Scores reflect the legal landscape as of ${d.lastUpdated}.
    </p>`;
}

// ════════════════════════════════════════════════════════════════
// MAP RENDERING
// ════════════════════════════════════════════════════════════════
let activeState = null;

function openPanel(name) {
  activeState = name;
  document.getElementById('detailInner').innerHTML = buildDetailHTML(name);
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('mapPanel').classList.add('panel-open');
  // Highlight active state
  d3.selectAll('.state-path').classed('active', d => {
    const fips = String(d.id).padStart(2, '0');
    return FIPS_TO_NAME[fips] === name;
  });
}

function closePanel() {
  activeState = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('mapPanel').classList.remove('panel-open');
  d3.selectAll('.state-path').classed('active', false);
}

// ════════════════════════════════════════════════════════════════
// MAP RENDERING  (with zoom + pan)
// ════════════════════════════════════════════════════════════════
const mapDiv = document.getElementById('map');
const tooltip = document.getElementById('tooltip');

// These are set during renderMap so zoom buttons can reference them
let _svg, _zoomBehavior;

function zoomIn()    { _svg && _svg.transition().duration(280).call(_zoomBehavior.scaleBy, 2); }
function zoomOut()   { _svg && _svg.transition().duration(280).call(_zoomBehavior.scaleBy, 0.5); }
function zoomReset() { _svg && _svg.transition().duration(380).call(_zoomBehavior.transform, d3.zoomIdentity); }

function renderMap() {
  // Fixed internal coordinate space — AlbersUSA fits well at 960×580
  const W = 960, H = 580;

  _svg = d3.select('#map').append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('width', '100%')
    .style('height', '100%');

  // Zoomable container group
  const g = _svg.append('g');

  // Projection — use fitExtent after features load so nothing is clipped
  const projection = d3.geoAlbersUsa();
  const path = d3.geoPath().projection(projection);

  // D3 zoom behavior
  _zoomBehavior = d3.zoom()
    .scaleExtent([0.9, 12])
    .on('start', () => _svg.classed('dragging', true))
    .on('zoom',  (event) => {
      g.attr('transform', event.transform);
      // Keep borders visually thin regardless of zoom level
      const k = event.transform.k;
      g.selectAll('.state-path').attr('stroke-width', 0.6 / k);
      g.select('.state-borders').attr('stroke-width', 0.5 / k);
    })
    .on('end', () => _svg.classed('dragging', false));

  _svg.call(_zoomBehavior);

  // Track pointer movement so we can tell click apart from pan
  let pointerDownPos = null;
  _svg.on('pointerdown', (e) => { pointerDownPos = [e.clientX, e.clientY]; });

  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
    const features = topojson.feature(us, us.objects.states).features;

    // Fit the projection to the SVG with comfortable padding
    projection.fitExtent([[30, 20], [W - 30, H - 20]],
      { type: 'FeatureCollection', features: features });

    // State fills
    g.selectAll('.state-path')
      .data(features)
      .join('path')
      .attr('class', 'state-path')
      .attr('d', path)
      .attr('fill', d => {
        const fips = String(d.id).padStart(2, '0');
        return getStateColor(FIPS_TO_NAME[fips]);
      })
      .on('mousemove', (event, d) => {
        tooltip.style.opacity = '0';   // hide while moving
        const fips = String(d.id).padStart(2, '0');
        const name = FIPS_TO_NAME[fips] || 'Unknown';
        const data = STATE_DATA[name];
        let html = `<div class="tt-state">${name}</div>`;
        if (data) {
          const cat = scoreCategory(data.rawScore);
          html += `<div class="tt-score">${data.rawScore}/24</div>`;
          html += `<div style="color:#94a3b8;font-size:0.72rem;margin-top:2px">${cat.label}</div>`;
          html += `<div class="tt-hint">Click for full scorecard →</div>`;
        } else {
          html += `<div style="color:#64748b;font-size:0.72rem;margin-top:2px">Not yet evaluated</div>`;
        }
        tooltip.innerHTML = html;
        tooltip.style.opacity = '1';
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top  = (event.clientY - 12) + 'px';
      })
      .on('mouseleave', () => { tooltip.style.opacity = '0'; })
      .on('click', (event, d) => {
        // Ignore if the pointer moved more than 6px (it was a pan, not a click)
        if (pointerDownPos) {
          const dx = event.clientX - pointerDownPos[0];
          const dy = event.clientY - pointerDownPos[1];
          if (Math.sqrt(dx*dx + dy*dy) > 6) return;
        }
        const fips = String(d.id).padStart(2, '0');
        const name = FIPS_TO_NAME[fips] || 'Unknown';
        if (activeState === name) { closePanel(); return; }
        openPanel(name);
      });

    // State borders (inner borders only — cleaner look)
    g.append('path')
      .attr('class', 'state-borders')
      .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
      .attr('fill', 'none')
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.5)
      .attr('d', path);

    // Outer nation border
    g.append('path')
      .datum(topojson.mesh(us, us.objects.states, (a, b) => a === b))
      .attr('fill', 'none')
      .attr('stroke', '#94a3b8')
      .attr('stroke-width', 0.8)
      .attr('d', path);

  }).catch(() => {
    mapDiv.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center">Map could not load — internet connection required.</p>';
  });
}

renderMap();
</script>
